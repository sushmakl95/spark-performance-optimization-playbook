name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.4.0"
      - name: Ruff check
        run: ruff check src tests benchmarks scripts

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install mypy
        run: pip install "mypy>=1.9.0"
      - name: Mypy
        run: mypy src --ignore-missing-imports

  security:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install bandit
        run: pip install "bandit[toml]>=1.7.8"
      - name: Bandit
        run: bandit -c pyproject.toml -r src benchmarks scripts -lll

  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: Terraform fmt check
        run: |
          if [ -d "infra/terraform" ]; then
            terraform -chdir=infra/terraform fmt -check -recursive || echo "Format issues (non-blocking)"
          else
            echo "No terraform/ directory — skipping"
          fi

  test-info:
    name: "Unit tests: run locally"
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Spark unit tests need Java 17 + PySpark 3.5 — run locally via 'make test-unit'"
          echo "See docs/LOCAL_DEVELOPMENT.md"
